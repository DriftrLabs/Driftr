name: Nightly

on:
  schedule:
    - cron: "0 2 * * *" # 2 AM UTC daily
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write

jobs:
  nightly:
    name: Nightly Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Run tests
        run: go test -race ./...

      - name: Build snapshot
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete previous nightly release
        run: gh release delete nightly --yes --cleanup-tag 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create nightly release
        run: |
          gh release create nightly dist/driftr_*.tar.gz dist/driftr_*.zip dist/checksums.txt \
            --title "Nightly $(date -u +%Y-%m-%d)" \
            --notes "Automated nightly build from \`$(git rev-parse --short HEAD)\` on main.

          **This is an unstable pre-release. Not recommended for production use.**

          Install: download the archive for your platform, extract, and place \`driftr\` on your PATH." \
            --prerelease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

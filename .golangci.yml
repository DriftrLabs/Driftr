version: "2"

run:
  timeout: 3m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - misspell
    - unconvert
    - unparam
    - bodyclose
    - nilerr
    - errname
    - errorlint
    - prealloc

  settings:
    errcheck:
      check-type-assertions: true

    govet:
      enable-all: true

    misspell:
      locale: US

formatters:
  enable:
    - gofmt
    - goimports

  settings:
    goimports:
      local-prefixes:
        - github.com/DriftrLabs/driftr

issues:
  max-issues-per-linter: 50
  max-same-issues: 5

  exclude-rules:
    - path: _test\.go
      linters:
        - unparam
    - path: _test\.go
      linters:
        - errcheck

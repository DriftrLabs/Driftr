version: "2"

run:
  timeout: 3m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - misspell
    - unconvert
    - unparam
    - bodyclose
    - nilerr
    - errname
    - errorlint
    - prealloc

  settings:
    errcheck:
      check-type-assertions: true

    govet:
      enable-all: true

    misspell:
      locale: US

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - unparam
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports

  settings:
    goimports:
      local-prefixes:
        - github.com/DriftrLabs/driftr

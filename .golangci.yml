version: "2"

run:
  timeout: 3m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - misspell
    - unconvert
    - unparam
    - bodyclose
    - nilerr
    - errname
    - errorlint
    - prealloc

  settings:
    errcheck:
      check-type-assertions: true
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintln
        - fmt.Fprintf
        - fmt.Print
        - fmt.Println
        - fmt.Printf
        - os.Remove
        - os.RemoveAll

    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow

    misspell:
      locale: US

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - unparam
          - errcheck
      - text: "Error return value of .+Close"
        linters:
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports

  settings:
    goimports:
      local-prefixes:
        - github.com/DriftrLabs/driftr
